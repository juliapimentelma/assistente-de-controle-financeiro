spring:
  application:
    name: ConselheiroFinanceiroAPI

  # CONFIGURAÇĂO DO BANCO DE DADOS (POSTGRESQL)
  datasource:
    url: jdbc:postgresql://localhost:5432/conselheiro_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  # CONFIGURAÇĂO DO JPA / HIBERNATE
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # CONFIGURAÇĂO DO FLYWAY (MIGRATIONS)
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # CONFIGURAÇĂO DO SPRING AI (OPENAI)
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

# CONFIGURAÇĂO DE SEGURANÇA (JWT RSA)
jwt:
  public:
    key: classpath:authz.pub
  private:
    key: classpath:authz.pem