<div class="game-track-container">
  
  <div class="track-bg"></div>

  <div class="track-fill" [style.width.%]="progresso"></div>

  @for (item of itensTrilha; track item.posicao) {
    <div 
      class="track-item" 
      [class.coletado]="progresso >= item.posicao"
      [style.left.%]="item.posicao">
      <img [src]="'/assets/' + item.img" alt="Item da Trilha">
    </div>
  }

  <div class="mario-character" [style.left.%]="progresso">
    <img [src]="'/assets/' + marioSprite" alt="Mario Sprite">
  </div>

</div>
